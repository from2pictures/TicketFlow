version: "3.8"

services:
  # 1. База данных
  postgres:
    image: postgres:16-alpine
    container_name: enterprise_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=booking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - enterprise_network

  # 2. Redis (кэш и вспомогательные задачи)
  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - enterprise_network

  # 3. Kafka в режиме KRaft (Без Zookeeper!)
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: enterprise_kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    networks:
      enterprise_network:
        aliases:
          - kafka

  # 4. Keycloak (Identity Provider)
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: enterprise_keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    command: start-dev
    networks:
      - enterprise_network

  # 5. Zipkin (Трейсинг)
  zipkin:
    image: openzipkin/zipkin
    container_name: enterprise_zipkin
    ports:
      - "9411:9411"
    networks:
      - enterprise_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  enterprise_network:
    driver: bridge
