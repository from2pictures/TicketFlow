spring:
  cache:
    type: redis
    redis:
      time-to-live: 300s
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  application:
    name: booking-service # Важно для Zipkin, чтобы понимать, кто отправил спан
  kafka:
    # ЭТО ТО, ЧТО СОХРАНИТ ТЕБЕ ЧАСЫ ДЕБАГА!
    template:
      observation-enabled: true # Для Producer (отправка в топик)
    listener:
      observation-enabled: true # Для Consumer (чтение из топика)
  datasource:
    url: jdbc:postgresql://localhost:5433/booking_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate # ТОЛЬКО validate! Flyway создает, Hibernate проверяет.
    show-sql: true
    open-in-view: on
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    w: 67

management:
  tracing:
    sampling:
      probability: 1.0 # На dev-окружении пишем 100% трейсов
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

server:
  port: 8081