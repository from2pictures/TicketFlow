volumes:
  catalog_db_data:   # Отдельный volume для catalog
    driver: local
  booking_db_data:   # Отдельный volume для booking
    driver: local
  payment_db_data:   # Отдельный volume для payment
    driver: local
  redis_data:
    driver: local

networks:
  enterprise_network:
    driver: bridge