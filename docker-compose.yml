services:
  # 1. Базы данных

  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_USER: catalog_login
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: catalog_db
    ports:
      - "5440:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data  # СВОЙ volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_login -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_network

  booking-db:
    image: postgres:16-alpine
    container_name: booking-db
    environment:
      POSTGRES_USER: booking_login
      POSTGRES_PASSWORD: booking_password
      POSTGRES_DB: booking_db
    ports:
      - "5437:5432"  # Для внешнего доступа
    volumes:
      - booking_db_data:/var/lib/postgresql/data  # СВОЙ volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_login -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_network

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: payment_login
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"  # Для внешнего доступа
    volumes:
      - payment_db_data:/var/lib/postgresql/data  # СВОЙ volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_login -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_network

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - enterprise_network

  # 3. Kafka в режиме KRaft
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: enterprise_kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - enterprise_network

  # 4. Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: enterprise_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev
    networks:
      - enterprise_network

  # 5. Zipkin
  zipkin:
    image: openzipkin/zipkin
    container_name: enterprise_zipkin
    ports:
      - "9411:9411"
    networks:
      - enterprise_network

  # 6. Сервисы

  catalog-service:
    build:
      context: ./catalog        # Папка catalog
      dockerfile: Dockerfile
    container_name: catalog-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog_db  # Порт 5432 внутри сети!
      SPRING_DATASOURCE_USERNAME: catalog_login
      SPRING_DATASOURCE_PASSWORD: catalog_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
    depends_on:
      catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_network

